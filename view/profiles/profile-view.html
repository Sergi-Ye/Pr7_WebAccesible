<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/styles/main.css" />
    <link rel="stylesheet" href="../assets/styles/user.css" />
    <title>Monogatarya - Perfil de Usuario</title>
</head>

<body>
    <header>
        <div class="header-gruop">
            <label for="menu-toggle" class="icon-btn white" aria-label="MenĂş">
                <svg class="icon">
                    <use href="../assets/img/icon-sprites.svg#menu"></use>
                </svg>
            </label>
            <img src="../assets/img/logo.webp" alt="Logo de la pĂˇgina">
            <h1>MONOGATARYA</h1>
            <div class="right-group">
                <a href="profile-view.html" class="icon-btn white user-link" aria-label="Ir al perfil de lector">
                    <svg class="icon">
                        <use href="../assets/img/icon-sprites.svg#usuario"></use>
                    </svg>
                </a>
            </div>
        </div>
    </header>


    <main class="page-main">
        <div class="layout-container">
            <section class="card-panel profile-panel" aria-labelledby="perfil-titulo">
                <h2 id="perfil-titulo" class="section-title">Perfil del usuario</h2>
                <form class="profile-layout" action="../index.html" method="post">

                    <!-- COLUMNA IZQUIERDA -->
                    <aside class="avatar-box">
                        <img src="../assets/img/logo.webp" alt="Avatar del usuario">

                        <label for="foto-user" class="file-label">Cambiar foto</label>
                        <input id="foto-user" type="file" accept="image/*">
                    </aside>

                    <!-- COLUMNA DERECHA -->
                    <section class="profile-form">

                        <div class="field">
                            <label for="nombre">Nombre</label>
                            <input id="nombre" name="nombre" required minlength="2">
                        </div>

                        <div class="field">
                            <label for="apellido">Apellidos</label>
                            <input id="apellido" name="apellido" required minlength="2">
                        </div>

                        <div class="field">
                            <label for="usuario">Nombre de usuario</label>
                            <input id="usuario" name="usuario" required minlength="4">
                        </div>

                        <div class="field">
                            <label for="password">ContraseĂ±a</label>
                            <input id="password" name="password" type="password" required minlength="6" maxlength="20"
                                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$"
                                title="La contraseĂ±a debe tener al menos 6 caracteres, una mayĂşscula, una minĂşscula y un nĂşmero.">
                        </div>

                        <div class="field full">
                            <label for="bio">BiografĂ­a</label>
                            <textarea id="bio" name="bio"></textarea>
                        </div>

                        <div class="profile-actions">
                            <button type="submit" class="btn btn-delete">Guardar cambios</button>
                            <button type="reset" class="btn btn-delete">Borrar cuenta</button>
                            <button type="reset" class="btn btn-add">Reiniciar</button>
                        </div>

                    </section>

                </form>
            </section>
        </div>
    </main>

    <input type="checkbox" id="menu-toggle">

    <ul class="menu-width">
        <li><a href="../index.html">PĂˇgina de inicio</a></li>
        <li><a href="../catalogs/anime/anime-catalog.html">CatĂˇlogo de animes</a></li>
        <li><a href="../catalogs/manga/manga-catalog.html">CatĂˇlogo de mangas (Proximamente)</a></li>
        <li><a href="../events/event-detail.html">Eventos</a></li>
        <li class="logout"><a href="../home.html">Cerrar sesiĂłn</a></li>
    </ul>

    <footer class="site-footer">
        <nav class="container" aria-label="Mapa web del sitio">
            <ul class="footer-links">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../catalogs/anime/anime-catalog.html">Catálogo de animes</a></li>
                <li><a href="../catalogs/manga/manga-catalog.html">Catálogo de mangas</a></li>
                <li><a href="../events/event-detail.html">Eventos</a></li>
                <li><a href="../profiles/profile-view.html">Perfil</a></li>
                <li><a href="../home.html">Cerrar sesión</a></li>
            </ul>
        </nav>
        <p class="footer-legal">© 2026 Monogatarya. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
